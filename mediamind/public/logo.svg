<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frameGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="letterGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Modern square frame with rounded corners -->
  <rect
    x="15"
    y="15"
    width="70"
    height="70"
    rx="8"
    ry="8"
    stroke="url(#frameGradient)"
    stroke-width="3"
    fill="none"
  />
  
  <!-- Letter "M" -->
  <path
    d="M30 65 L30 35 L40 50 L50 35 L60 50 L70 35 L70 65"
    stroke="url(#letterGradient)"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  
  <!-- Modern accent dots -->
  <circle cx="25" cy="25" r="2" fill="url(#frameGradient)" opacity="0.8" />
  <circle cx="75" cy="75" r="2" fill="url(#frameGradient)" opacity="0.8" />
</svg>